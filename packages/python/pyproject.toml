[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "authrelay"
version = "1.0.0"
description = "SDK for AI agents to request human-in-the-loop authentication via AuthRelay"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "AuthRelay Team", email = "info@authrelay.app"}
]
keywords = ["authrelay", "authentication", "human-in-the-loop", "ai-agents"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Networking",
]

[project.optional-dependencies]
async = ["aiohttp>=3.8.0"]
dev = ["pytest>=7.0", "black", "mypy", "pytest-asyncio"]

[project.urls]
Homepage = "https://github.com/authrelay/sdk"
Documentation = "https://github.com/authrelay/sdk"
Repository = "https://github.com/authrelay/sdk"
Issues = "https://github.com/authrelay/sdk/issues"

[tool.setuptools]
packages = ["authrelay"]
